<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas — Editor de notas y resúmenes</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Pantalla de inicio de sesión (se oculta al estar logueado) -->
  <div class="auth-screen" id="authScreen">
    <div class="auth-box">
      <h1 class="auth-title">Notas</h1>
      <p class="auth-subtitle">Inicia sesión para ver tus notas en todos los dispositivos</p>
      <form id="authForm" class="auth-form">
        <input type="email" id="authEmail" placeholder="Email" required autocomplete="email">
        <input type="password" id="authPassword" placeholder="Contraseña (mín. 6)" required minlength="6" autocomplete="current-password">
        <p id="authError" class="auth-error"></p>
        <div class="auth-buttons">
          <button type="submit" class="btn btn-primary" id="authSubmit">Iniciar sesión</button>
          <button type="button" class="btn btn-secondary" id="authSwitch">Crear cuenta</button>
        </div>
        <button type="button" class="btn-link" id="authSkip">Continuar sin cuenta (solo este dispositivo)</button>
      </form>
    </div>
  </div>

  <div class="app" id="appMain">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1 class="logo">Notas</h1>
        <div class="sidebar-user">
          <span class="user-email" id="userEmail"></span>
          <button type="button" class="btn btn-secondary btn-sm" id="logoutBtn" title="Cerrar sesión">Cerrar sesión</button>
        </div>
      </div>
      <div class="sidebar-actions">
        <button class="btn btn-primary" id="newNote">+ Nueva nota</button>
        <button class="btn btn-secondary" id="newFolder">+ Carpeta</button>
      </div>
      <div class="folders-section">
        <div class="section-title">Carpetas</div>
        <ul class="folder-list" id="folderList"></ul>
      </div>
      <div class="notes-section">
        <div class="section-title">Notas</div>
        <ul class="note-list" id="noteList"></ul>
      </div>
      <div class="summaries-section">
        <div class="section-title">Resúmenes</div>
        <ul class="summary-list" id="summaryList"></ul>
      </div>
    </aside>

    <!-- Main content -->
    <main class="main">
      <header class="toolbar">
        <button type="button" class="btn-icon" id="themeToggle" aria-label="Modo día/noche" title="Modo día/noche">🌙</button>
        <button type="button" class="btn-icon btn-menu-main" id="openMenuBtn" aria-label="Abrir/cerrar menú">≡</button>
        <div class="toolbar-group">
          <select id="fontFamily" title="Fuente">
            <option value="Arial">Arial</option>
            <option value="Georgia">Georgia</option>
            <option value="'Times New Roman'">Times New Roman</option>
            <option value="Verdana">Verdana</option>
            <option value="'Courier New'">Courier New</option>
            <option value="Trebuchet MS">Trebuchet MS</option>
            <option value="Impact">Impact</option>
            <option value="Comic Sans MS">Comic Sans MS</option>
          </select>
          <select id="fontSize" title="Tamaño">
            <option value="1">Pequeño</option>
            <option value="2">Normal</option>
            <option value="3">Mediano</option>
            <option value="4">Grande</option>
            <option value="5">Muy grande</option>
          </select>
          <button type="button" class="btn-tool" data-cmd="bold" title="Negrita">B</button>
          <button type="button" class="btn-tool" data-cmd="italic" title="Cursiva">I</button>
          <button type="button" class="btn-tool" data-cmd="underline" title="Subrayado">S</button>
          <button type="button" class="btn-tool" data-cmd="strikeThrough" title="Tachado">T</button>
        </div>
        <div class="toolbar-group">
          <input type="color" id="textColor" value="#000000" title="Color de texto">
          <input type="color" id="highlightColor" value="#ffff00" title="Resaltar">
          <button type="button" class="btn-tool" data-cmd="foreColor" data-value="textColor" title="Aplicar color texto">A</button>
          <button type="button" class="btn-tool" data-cmd="backColor" data-value="highlightColor" title="Resaltar">🖍</button>
        </div>
        <div class="toolbar-group">
          <button type="button" class="btn-tool btn-align-icon" data-cmd="justifyLeft" title="Alinear a la izquierda" aria-label="Alinear a la izquierda"><span class="icon-align-left" aria-hidden="true"></span></button>
          <button type="button" class="btn-tool btn-align-icon" data-cmd="justifyCenter" title="Centrar" aria-label="Centrar"><span class="icon-align-center" aria-hidden="true"></span></button>
          <button type="button" class="btn-tool btn-align-icon" data-cmd="justifyRight" title="Alinear a la derecha" aria-label="Alinear a la derecha"><span class="icon-align-right" aria-hidden="true"></span></button>
          <button type="button" class="btn-tool" data-cmd="insertUnorderedList" title="Lista">•</button>
          <button type="button" class="btn-tool" data-cmd="insertOrderedList" title="Lista numerada">1.</button>
        </div>
        <div class="toolbar-group">
          <button type="button" class="btn-tool" data-cmd="formatHeading" title="Marcar como título">Título</button>
          <button type="button" class="btn-tool" id="addImageBtn" title="Insertar imagen">🖼 Imagen</button>
          <input type="file" id="imageFileInput" accept="image/*" hidden>
          <button type="button" class="btn-tool" id="insertTableBtn" title="Insertar tabla">⊞ Tabla</button>
          <button type="button" class="btn-tool" id="addTextBox" title="Añadir cuadro de texto">+ Cuadro texto</button>
          <button type="button" class="btn-tool" id="toggleDrawMode" title="Dibujar sobre la hoja">✎ Dibujo</button>
        </div>
        <div class="toolbar-group draw-tools" id="drawTools" style="display: none;">
          <input type="color" id="drawColor" value="#000000" title="Color del pincel">
          <input type="range" id="drawSize" min="1" max="20" value="3" title="Grosor">
          <button type="button" class="btn btn-secondary btn-sm" id="undoDrawingStroke" title="Deshacer último trazo">↩ Deshacer trazo</button>
          <button type="button" class="btn btn-secondary btn-sm" id="clearPageDrawing" title="Borrar todo el dibujo">Borrar todo</button>
        </div>
        <div class="toolbar-group toolbar-actions">
          <button type="button" class="btn btn-secondary" id="generateSummary" title="Generar resumen con bullets">Resumir</button>
          <button type="button" class="btn btn-primary" id="exportPdf">Exportar PDF</button>
        </div>
      </header>

      <div class="page-content" id="pageContent">
        <div class="note-meta">
          <input type="text" class="note-title-input" id="noteTitle" placeholder="Título de la nota">
          <select id="noteFolder" class="note-folder-select">
            <option value="">Sin carpeta</option>
          </select>
        </div>
        <div class="pages-and-outline">
          <div class="pages-container" id="pagesContainer">
          <div class="sheet page" id="currentPage" data-page-index="0">
            <div class="page-body" contenteditable="true" data-placeholder="Escribe en la hoja..."></div>
            <canvas class="page-drawing-canvas" aria-label="Dibujo sobre la hoja"></canvas>
          </div>
        </div>
          <aside class="outline-panel" id="outlinePanel">
            <div class="outline-title">Títulos</div>
            <ul class="outline-list" id="outlineList"></ul>
          </aside>
        </div>
        <footer class="editor-footer" id="editorFooter" aria-live="polite">
          <span class="footer-stat" id="pageCounter">Pág. 1 de 1</span>
          <span class="footer-stat" id="wordCount">0 palabras</span>
          <span class="footer-stat" id="charCount">0 caracteres</span>
        </footer>
      </div>
    </main>
    <div class="image-context-menu" id="imageContextMenu">
      <button type="button" data-wrap="behind">Detrás del texto</button>
      <button type="button" data-wrap="front">Delante del texto</button>
      <button type="button" data-order="back">Enviar atrás</button>
      <button type="button" data-order="front">Traer al frente</button>
    </div>

    <!-- Overlay sidebar on mobile -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>
  </div>

  <!-- Modal Resumen -->
  <div class="modal" id="summaryModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Resumen</h2>
        <button type="button" class="btn-close" id="closeSummaryModal">×</button>
      </div>
      <div class="modal-body">
        <div id="summaryContent" class="summary-content"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" id="continueSummaryBtn">Seguir generando</button>
      </div>
    </div>
  </div>

  <!-- Vista principal / Resúmenes (tabs o vista única) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
